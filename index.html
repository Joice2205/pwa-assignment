<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poomozhi Florist</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/icon-192.png" type="image/png">
<meta name="theme-color" content="#ff4d6d">

<style>
:root{
  --primary:#ff4d6d;
  --secondary:#ff9aa2;
  --light:#fff1f4;
  --dark:#222;
  --glass:rgba(255,255,255,0.85);
}

*{ box-sizing:border-box; font-family:"Segoe UI", sans-serif; }

body{
  margin:0;
  background:linear-gradient(180deg,#fff1f4,#ffffff);
  color:var(--dark);
  padding-bottom:80px;
}

header{
  position:sticky;
  top:0;
  background:linear-gradient(90deg,#ff4d6d,#ff758f);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 40px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  z-index:10;
}

header h1{ margin:0; color:white; }

nav a{
  margin:0 14px;
  text-decoration:none;
  color:white;
  font-weight:500;
}

.cart-btn{
  background:white;
  color:var(--primary);
  border:none;
  padding:9px 18px;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.hero{
  min-height:85vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  padding:80px;
  background:
    linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0.7)),
    url("images/logo.jpeg") center/cover;
}

.hero h2{ font-size:48px; }

.products{ padding:70px; }

.products h2{
  text-align:center;
  font-size:36px;
  margin-bottom:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:35px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 15px 30px rgba(0,0,0,0.12);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.info{ padding:18px; }

.price{
  color:var(--primary);
  font-weight:bold;
  margin:6px 0 14px;
  font-size:18px;
}

.card button{
  width:100%;
  padding:11px;
  background:linear-gradient(45deg,#ff4d6d,#ff758f);
  color:white;
  border:none;
  border-radius:22px;
  cursor:pointer;
}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:22px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <h1>🌸 PooMozhi</h1>
  <button class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</button>
</header>

<section class="hero">
  <div>
    <h2>Malargal Pesum Mouna Mozhi</h2>
    <p>Premium hand-picked flowers for unforgettable moments.</p>
  </div>
</section>

<section class="products">
  <h2>Best Sellers</h2>

  <div class="grid">
    <div class="card">
      <img src="images/rose.webp">
      <div class="info">
        <h3>Rose Bouquet</h3>
        <div class="price">₹999</div>
        <button onclick="add('Rose Bouquet',999)">Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="images/sunflower.jpg">
      <div class="info">
        <h3>Sunflower Bliss</h3>
        <div class="price">₹1299</div>
        <button onclick="add('Sunflower Bliss',1299)">Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="images/garland.jpg">
      <div class="info">
        <h3>Garlands</h3>
        <div class="price">₹1499</div>
        <button onclick="add('Garlands',1499)">Add to Cart</button>
      </div>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 PooMozhi Florist • Chennai</p>
</footer>

<script>
let cart = [], total = 0;

function toggleCart(){
  alert("Cart Items: " + cart.length + "\nTotal: ₹" + total);
}

function add(name,price){
  cart.push({name,price});
  total += price;
  document.getElementById("count").innerText = cart.length;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
